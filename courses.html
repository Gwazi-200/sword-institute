    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ============================================================
           ROOT VARIABLES - iOS Glass Theme
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pearl-light: #FCFAF5;
            --pearl-mid: #F5F2EB;
            --pearl-shadow: #E8E2D8;
            --violet-deep: #8B00FF;
            --violet-glow: rgba(139, 0, 255, 0.12);
            --violet-soft: #A855F7;
            --violet-dark: #3B0764;
            --gold-radiant: #FFD700;
            --gold-soft: #FDE68A;
            --gold-glow: rgba(255, 215, 0, 0.2);
            --text-primary: #1E1029;
            --text-secondary: #4B3A5C;
            --text-muted: #7A6A8A;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px rgba(139, 0, 255, 0.06);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 0% 20%, var(--pearl-light), var(--pearl-mid) 60%, var(--pearl-shadow));
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            padding: 20px;
            margin: 0;
        }

        .app-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 60px -15px rgba(139, 0, 255, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
            padding: 20px 32px 32px;
            position: relative;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--violet-deep);
            top: -150px;
            right: -100px;
            opacity: 0.1;
        }
        .orb-2 {
            width: 350px;
            height: 350px;
            background: var(--gold-radiant);
            bottom: -100px;
            left: -100px;
            opacity: 0.12;
        }

        .container {
            position: relative;
            z-index: 2;
        }

        /* ============================================================
           BUTTONS
           ============================================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background: var(--violet-deep);
            color: #fff;
            border-color: var(--violet-deep);
            box-shadow: 0 4px 15px rgba(139, 0, 255, 0.25);
        }
        .btn-primary:hover {
            background: #9B1DFF;
            border-color: #9B1DFF;
            box-shadow: 0 8px 30px rgba(139, 0, 255, 0.35);
            color: #fff;
        }

        .btn-gold {
            background: var(--gold-radiant);
            color: var(--violet-dark);
            border-color: var(--gold-radiant);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.25);
        }
        .btn-gold:hover {
            background: #FFE44D;
            border-color: #FFE44D;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.35);
            color: var(--violet-dark);
        }

        .btn-outline-violet {
            background: transparent;
            border-color: rgba(139, 0, 255, 0.2);
            color: var(--violet-deep);
        }
        .btn-outline-violet:hover {
            background: var(--violet-deep);
            color: #fff;
            border-color: var(--violet-deep);
        }

        .btn-success {
            background: #16a34a;
            color: #fff;
            border-color: #16a34a;
        }
        .btn-success:hover {
            background: #22c55e;
            border-color: #22c55e;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ============================================================
           NAVIGATION
           ============================================================ */
        nav {
            padding: 8px 0 20px;
            position: relative;
            z-index: 10;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .logo i {
            background: linear-gradient(135deg, var(--violet-deep), var(--gold-radiant));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
        }
        .logo span {
            background: linear-gradient(135deg, var(--violet-deep), var(--violet-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
            position: relative;
        }
        .nav-links a:hover {
            color: var(--violet-deep);
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--violet-deep);
            transition: width 0.3s;
            border-radius: 2px;
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .nav-links a.active {
            color: var(--violet-deep);
            font-weight: 700;
        }
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ============================================================
           COURSE CATALOGUE
           ============================================================ */
        .catalogue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
        }
        .catalogue-header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .catalogue-header h1 .violet {
            color: var(--violet-deep);
        }
        .catalogue-header .sub {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }
        .catalogue-header .sub i {
            color: var(--gold-radiant);
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 32px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: var(--radius-md);
        }
        .filter-bar .filter-label {
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-bar .filter-label i {
            color: var(--violet-deep);
        }
        .filter-bar .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(139, 0, 255, 0.1);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .filter-btn:hover {
            border-color: var(--violet-deep);
            color: var(--violet-deep);
        }
        .filter-btn.active {
            background: var(--violet-deep);
            color: #fff;
            border-color: var(--violet-deep);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.35s ease;
            box-shadow: var(--glass-shadow);
            text-decoration: none;
            color: var(--text-primary);
            cursor: pointer;
            display: block;
        }
        .course-card:hover {
            transform: translateY(-8px);
            border-color: var(--violet-deep);
            box-shadow: 0 20px 40px -12px rgba(139, 0, 255, 0.15);
        }

        .course-thumb {
            height: 140px;
            background: linear-gradient(135deg, rgba(139, 0, 255, 0.05), rgba(255, 215, 0, 0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            color: var(--violet-deep);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }
        .course-thumb .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--gold-radiant);
            color: var(--violet-dark);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 30px;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .course-thumb .lesson-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--violet-deep);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 30px;
            box-shadow: 0 2px 10px rgba(139, 0, 255, 0.3);
        }
        .course-thumb .enrolled-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(34, 197, 94, 0.9);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 30px;
            box-shadow: 0 2px 10px rgba(34, 197, 94, 0.3);
            display: none;
        }
        .course-thumb .enrolled-badge.show {
            display: block;
        }

        .course-body {
            padding: 20px 20px 24px;
        }
        .course-body h4 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
        }
        .course-body p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .course-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(139, 0, 255, 0.04);
            padding-top: 12px;
        }
        .course-meta i {
            color: var(--violet-deep);
            margin-right: 4px;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(139, 0, 255, 0.03) 25%, rgba(139, 0, 255, 0.07) 50%, rgba(139, 0, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
        .skeleton-thumb {
            height: 140px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        .skeleton-title {
            height: 20px;
            width: 80%;
            margin-bottom: 8px;
        }
        .skeleton-text {
            height: 14px;
            width: 90%;
            margin-bottom: 4px;
        }
        .skeleton-meta {
            height: 16px;
            width: 60%;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            padding: 32px 0 8px;
            margin-top: 40px;
            border-top: 1px solid rgba(139, 0, 255, 0.04);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .footer i {
            color: var(--violet-deep);
        }
        .footer .gold {
            color: var(--gold-radiant);
        }

        /* ============================================================
           TOAST NOTIFICATION
           ============================================================ */
        .toast-notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            max-width: 400px;
            padding: 16px 20px;
            border-radius: 16px;
            background: rgba(34, 197, 94, 0.95);
            color: #fff;
            font-weight: 600;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px -12px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }
        .toast-notification.error {
            background: rgba(220, 38, 38, 0.95);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100px);
                opacity: 0;
            }
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 1024px) {
            .app-wrapper {
                padding: 16px;
                border-radius: var(--radius-lg);
            }
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-links {
                justify-content: center;
                gap: 20px;
                flex-wrap: wrap;
            }
            .nav-actions {
                justify-content: center;
            }
            .catalogue-header h1 {
                font-size: 1.8rem;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-bar .filter-group {
                justify-content: center;
            }
            .courses-grid {
                grid-template-columns: 1fr 1fr;
            }
            body {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .courses-grid {
                grid-template-columns: 1fr;
            }
            .app-wrapper {
                padding: 12px;
            }
            .catalogue-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

        // =============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD6lVyvaA7uhcX3qvxvOp3dqiGxb8Td4xs",
            authDomain: "sword-institute-lms.firebaseapp.com",
            projectId: "sword-institute-lms",
            storageBucket: "sword-institute-lms.firebasestorage.app",
            messagingSenderId: "478896038426",
            appId: "1:478896038426:web:c24c6373edc1cba14a67a3"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // =============================================================
        // DOM References
        // =============================================================
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const dashboardBtn = document.getElementById('dashboardBtn');
        const coursesContainer = document.getElementById('coursesContainer');
        const courseCount = document.getElementById('courseCount');
        const filterButtons = document.querySelectorAll('.filter-btn');

        let allCourses = [];
        let currentFilter = 'all';
        let currentUser = null;
        let enrollmentCache = {};

        // =============================================================
        // AUTH STATE
        // =============================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                loginBtn.style.display = 'none';
                registerBtn.style.display = 'none';
                dashboardBtn.style.display = 'inline-flex';

                // Load enrollment statuses
                if (allCourses.length > 0) {
                    await loadEnrollmentStatuses();
                }
            } else {
                currentUser = null;
                enrollmentCache = {};
                loginBtn.style.display = 'inline-flex';
                registerBtn.style.display = 'inline-flex';
                dashboardBtn.style.display = 'none';
                renderCourses(allCourses);
            }
        });

        // =============================================================
        // LOAD ENROLLMENT STATUSES
        // =============================================================
        async function loadEnrollmentStatuses() {
            if (!currentUser || allCourses.length === 0) return;

            try {
                const courseIds = allCourses.map(c => c.id);
                if (courseIds.length === 0) return;

                const snapshot = await db.collection('enrollments')
                    .where('userId', '==', currentUser.uid)
                    .where('courseId', 'in', courseIds)
                    .get();

                enrollmentCache = {};
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    enrollmentCache[data.courseId] = {
                        enrolled: true,
                        enrollmentId: doc.id,
                        progress: data.progress || 0,
                        completed: data.completed || false
                    };
                });

                renderCourses(allCourses);
            } catch (error) {
                console.warn('Could not load enrollment statuses:', error);
            }
        }

        // =============================================================
        // LOAD COURSES
        // =============================================================
        async function loadCourses() {
            try {
                const snapshot = await db.collection('courses')
                    .orderBy('order', 'asc')
                    .get();

                if (snapshot.empty) {
                    coursesContainer.innerHTML = `
                            <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-secondary);background:rgba(255,255,255,0.25);border-radius:var(--radius-lg);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.5);">
                                <i class="fas fa-cloud-upload-alt" style="font-size:3rem;color:var(--violet-deep);margin-bottom:16px;display:block;"></i>
                                <h3 style="color:var(--text-primary);margin-bottom:8px;">Awaiting Sacred Scrolls</h3>
                                <p>Add your first course in Firebase Firestore under the "courses" collection.</p>
                            </div>
                        `;
                    courseCount.textContent = '0 courses';
                    return;
                }

                allCourses = [];
                snapshot.forEach((doc) => {
                    allCourses.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });

                courseCount.textContent = `${allCourses.length} courses`;

                if (currentUser) {
                    await loadEnrollmentStatuses();
                } else {
                    renderCourses(allCourses);
                }

            } catch (error) {
                console.error('Error loading courses:', error);
                coursesContainer.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:#8B00FF;background:rgba(139,0,255,0.02);border-radius:var(--radius-lg);border:1px solid rgba(139,0,255,0.08);">
                            <i class="fas fa-triangle-exclamation" style="font-size:2rem;margin-bottom:12px;display:block;color:var(--gold-radiant);"></i>
                            <h4 style="color:var(--text-primary);">Connection to the Divine Network failed</h4>
                            <p style="font-size:0.9rem;color:var(--text-secondary);">Check your Firebase config and ensure the "courses" collection exists.</p>
                            <p style="font-size:0.8rem;margin-top:8px;color:var(--text-muted);">${error.message}</p>
                        </div>
                    `;
            }
        }

        // =============================================================
        // RENDER COURSES
        // =============================================================
        function renderCourses(courses) {
            if (!courses || courses.length === 0) {
                coursesContainer.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text-secondary);background:rgba(255,255,255,0.25);border-radius:var(--radius-lg);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.5);">
                            <i class="fas fa-filter" style="font-size:2.5rem;color:var(--violet-deep);margin-bottom:12px;display:block;"></i>
                            <h4 style="color:var(--text-primary);">No courses match this filter</h4>
                            <p>Try selecting a different category.</p>
                        </div>
                    `;
                return;
            }

            let html = '';
            courses.forEach((course) => {
                const title = course.title || 'Untitled Scroll';
                const description = course.description || 'No wisdom shared yet.';
                const category = course.category || 'General';
                const duration = course.duration || 'Self-paced';
                const icon = course.icon || 'fa-book';
                const level = course.level || 'Beginner';
                const totalLessons = course.totalLessons || 0;

                const isEnrolled = enrollmentCache[course.id]?.enrolled || false;
                const progress = enrollmentCache[course.id]?.progress || 0;
                const isCompleted = enrollmentCache[course.id]?.completed || false;

                const enrolledBadgeClass = isEnrolled ? 'show' : '';
                const progressText = isEnrolled ? (isCompleted ? '✅ Completed' : `${progress}% Complete`) : '';

                html += `
                        <a href="course-view.html?id=${course.id}" class="course-card">
                            <div class="course-thumb">
                                <i class="fas ${icon}"></i>
                                <span class="badge">${level}</span>
                                <span class="lesson-badge">${totalLessons} Lessons</span>
                                <span class="enrolled-badge ${enrolledBadgeClass}">✓ Enrolled</span>
                            </div>
                            <div class="course-body">
                                <h4>${title}</h4>
                                <p>${description}</p>
                                <div class="course-meta">
                                    <span><i class="fas fa-tag"></i> ${category}</span>
                                    <span><i class="fas fa-clock"></i> ${duration}</span>
                                    ${isEnrolled ? `<span><i class="fas fa-check-circle" style="color:#16a34a;"></i> ${progressText}</span>` : ''}
                                </div>
                            </div>
                        </a>
                    `;
            });

            coursesContainer.innerHTML = html;
        }

        // =============================================================
        // FILTER HANDLING
        // =============================================================
        filterButtons.forEach((btn) => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.dataset.filter;
                currentFilter = filter;

                if (filter === 'all') {
                    renderCourses(allCourses);
                } else {
                    const filtered = allCourses.filter(course =>
                        course.category && course.category === filter
                    );
                    renderCourses(filtered);
                }
            });
        });

        // =============================================================
        // INITIALIZE
        // =============================================================
        document.addEventListener('DOMContentLoaded', loadCourses);
        console.log('📚 Course catalogue initialized successfully');
    </script>
</body>
</html>
