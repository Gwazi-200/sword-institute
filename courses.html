<script type="module">
    import {
        auth,
        db,
        onAuthStateChanged,
        collection,
        query,
        orderBy,
        getDocs,
        where,
        doc,
        getDoc
    } from './firebase.js';
    
    // Import enrollment functions
    import {
        enrollInCourse,
        checkEnrollment,
        getUserEnrollments,
        getBulkEnrollmentStatus
    } from './enrollmentService.js';

    // DOM Elements
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const coursesContainer = document.getElementById('coursesContainer');
    const courseCount = document.getElementById('courseCount');
    const filterButtons = document.querySelectorAll('.filter-btn');

    let allCourses = [];
    let currentFilter = 'all';
    let currentUser = null;
    let enrollmentCache = {}; // Cache for quick enrollment checks

    // =============================================================
    // AUTH STATE
    // =============================================================
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            loginBtn.textContent = 'Dashboard';
            loginBtn.href = 'dashboard.html';
            loginBtn.className = 'btn btn-primary';
            registerBtn.textContent = 'Logout';
            registerBtn.href = '#';
            registerBtn.className = 'btn btn-outline-violet';
            registerBtn.onclick = (e) => {
                e.preventDefault();
                auth.signOut();
            };
            
            // Load enrollment statuses for all courses
            await loadEnrollmentStatuses();
        } else {
            currentUser = null;
            enrollmentCache = {};
            loginBtn.textContent = 'Login';
            loginBtn.href = 'login.html';
            loginBtn.className = 'btn btn-outline-violet';
            registerBtn.textContent = 'Register';
            registerBtn.href = 'register.html';
            registerBtn.className = 'btn btn-primary';
            registerBtn.onclick = null;
            
            // Re-render courses without enrollment status
            renderCourses(allCourses);
        }
    });

    // =============================================================
    // LOAD ENROLLMENT STATUSES
    // =============================================================
    async function loadEnrollmentStatuses() {
        if (!currentUser) return;
        
        try {
            // Get all course IDs
            const courseIds = allCourses.map(c => c.id);
            if (courseIds.length === 0) return;
            
            // Bulk check enrollment
            const enrollmentsRef = collection(db, 'enrollments');
            const q = query(
                enrollmentsRef,
                where('userId', '==', currentUser.uid),
                where('courseId', 'in', courseIds)
            );
            const snapshot = await getDocs(q);
            
            enrollmentCache = {};
            snapshot.forEach((doc) => {
                const data = doc.data();
                enrollmentCache[data.courseId] = {
                    enrolled: true,
                    enrollmentId: doc.id,
                    progress: data.progress || 0,
                    completed: data.completed || false
                };
            });
            
            // Re-render with enrollment status
            renderCourses(allCourses);
        } catch (error) {
            console.warn('Could not load enrollment statuses:', error);
        }
    }

    // =============================================================
    // HANDLE ENROLLMENT
    // =============================================================
    async function handleEnrollment(courseId, event) {
        event.preventDefault();
        event.stopPropagation();
        
        if (!currentUser) {
            // Redirect to login
            window.location.href = 'login.html';
            return;
        }
        
        // Check if already enrolled
        if (enrollmentCache[courseId]?.enrolled) {
            // Already enrolled - navigate to course or dashboard
            window.location.href = 'dashboard.html';
            return;
        }
        
        // Show loading state on button
        const btn = event.currentTarget;
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enrolling...';
        btn.disabled = true;
        
        try {
            const result = await enrollInCourse(courseId);
            
            if (result.success) {
                // Update cache
                enrollmentCache[courseId] = {
                    enrolled: true,
                    enrollmentId: result.enrollmentId,
                    progress: 0,
                    completed: false
                };
                
                // Show success toast
                showToast('🎉 Successfully enrolled! Redirecting to dashboard...', 'success');
                
                // Update button
                btn.innerHTML = '<i class="fas fa-arrow-right"></i> Continue Learning';
                btn.className = 'btn btn-gold';
                btn.onclick = (e) => {
                    e.preventDefault();
                    window.location.href = 'dashboard.html';
                };
                
                // Redirect after 1.5 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } else {
                showToast(`❌ ${result.error || 'Failed to enroll'}`, 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        } catch (error) {
            showToast('❌ An error occurred. Please try again.', 'error');
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // =============================================================
    // TOAST NOTIFICATION
    // =============================================================
    function showToast(message, type = 'success') {
        // Remove existing toast
        const existingToast = document.querySelector('.toast-notification');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.cssText = `
            position: fixed;
            bottom: 24px;
            right: 24px;
            max-width: 400px;
            padding: 16px 20px;
            border-radius: 16px;
            background: ${type === 'success' ? 'rgba(34, 197, 94, 0.95)' : 'rgba(220, 38, 38, 0.95)'};
            color: #fff;
            font-weight: 600;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px -12px rgba(0,0,0,0.2);
            z-index: 9999;
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        `;
        toast.textContent = message;
        
        document.body.appendChild(toast);
        
        // Auto-remove after 3 seconds
        setTimeout(() => {
            toast.style.animation = 'slideOut 0.3s ease forwards';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // Add animation styles
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100px); opacity: 0; }
        }
    `;
    document.head.appendChild(style);

    // =============================================================
    // LOAD COURSES
    // =============================================================
    async function loadCourses() {
        try {
            const coursesRef = collection(db, 'courses');
            const q = query(coursesRef, orderBy('createdAt', 'desc'));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                coursesContainer.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-secondary);background:rgba(255,255,255,0.25);border-radius:var(--radius-lg);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.5);">
                        <i class="fas fa-cloud-upload-alt" style="font-size:3rem;color:var(--violet-deep);margin-bottom:16px;display:block;"></i>
                        <h3 style="color:var(--text-primary);margin-bottom:8px;">Awaiting Sacred Scrolls</h3>
                        <p>Add your first course in Firebase Firestore under the "courses" collection.</p>
                    </div>
                `;
                courseCount.textContent = '0 courses';
                return;
            }

            allCourses = [];
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                allCourses.push({
                    id: doc.id,
                    ...data
                });
            });

            courseCount.textContent = `${allCourses.length} courses`;
            
            // Load enrollment statuses if user is logged in
            if (currentUser) {
                await loadEnrollmentStatuses();
            } else {
                renderCourses(allCourses);
            }

        } catch (error) {
            console.error('Error loading courses:', error);
            coursesContainer.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:#8B00FF;background:rgba(139,0,255,0.02);border-radius:var(--radius-lg);border:1px solid rgba(139,0,255,0.08);">
                    <i class="fas fa-triangle-exclamation" style="font-size:2rem;margin-bottom:12px;display:block;color:var(--gold-radiant);"></i>
                    <h4 style="color:var(--text-primary);">Connection to the Divine Network failed</h4>
                    <p style="font-size:0.9rem;color:var(--text-secondary);">Check your Firebase config and ensure the "courses" collection exists.</p>
                    <p style="font-size:0.8rem;margin-top:8px;color:var(--text-muted);">${error.message}</p>
                </div>
            `;
        }
    }

    // =============================================================
    // RENDER COURSES
    // =============================================================
    function renderCourses(courses) {
        if (courses.length === 0) {
            coursesContainer.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text-secondary);background:rgba(255,255,255,0.25);border-radius:var(--radius-lg);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.5);">
                    <i class="fas fa-filter" style="font-size:2.5rem;color:var(--violet-deep);margin-bottom:12px;display:block;"></i>
                    <h4 style="color:var(--text-primary);">No courses match this filter</h4>
                    <p>Try selecting a different category.</p>
                </div>
            `;
            return;
        }

        let html = '';
        courses.forEach((course) => {
            const title = course.title || 'Untitled Scroll';
            const description = course.description || 'No wisdom shared yet.';
            const category = course.category || 'General';
            const duration = course.duration || 'Self-paced';
            const icon = course.icon || 'fa-book';
            const level = course.level || 'Beginner';
            
            // Check enrollment status
            const isEnrolled = enrollmentCache[course.id]?.enrolled || false;
            const progress = enrollmentCache[course.id]?.progress || 0;
            const isCompleted = enrollmentCache[course.id]?.completed || false;
            
            // Determine button state
            let buttonHtml = '';
            if (isEnrolled) {
                const progressText = isCompleted ? '🎓 Completed' : `${progress}% Complete`;
                buttonHtml = `
                    <a href="dashboard.html" class="btn btn-gold">
                        <i class="fas fa-arrow-right"></i> Continue Learning
                    </a>
                    <div style="font-size:0.7rem;color:var(--text-muted);text-align:center;margin-top:4px;">
                        ${progressText}
                    </div>
                `;
            } else {
                buttonHtml = `
                    <a href="#" class="btn btn-primary" onclick="window.handleEnrollment('${course.id}', event)">
                        <i class="fas fa-plus"></i> Enroll
                    </a>
                `;
            }

            html += `
                <div class="course-card" data-course-id="${course.id}">
                    <div class="course-thumb">
                        <i class="fas ${icon}"></i>
                        <span class="badge">${level}</span>
                        ${isEnrolled ? '<span class="badge" style="background:var(--violet-deep);color:#fff;right:auto;left:12px;">✓ Enrolled</span>' : ''}
                    </div>
                    <div class="course-body">
                        <h4>${title}</h4>
                        <p>${description}</p>
                        <div class="course-meta">
                            <span><i class="fas fa-tag"></i> ${category}</span>
                            <span><i class="fas fa-clock"></i> ${duration}</span>
                        </div>
                        <div class="course-actions" style="display:flex;flex-direction:column;gap:6px;">
                            ${buttonHtml}
                        </div>
                    </div>
                </div>
            `;
        });

        coursesContainer.innerHTML = html;
        
        // Attach event listeners for enroll buttons
        document.querySelectorAll('.course-actions .btn-primary').forEach((btn) => {
            const card = btn.closest('.course-card');
            if (card) {
                const courseId = card.dataset.courseId;
                btn.onclick = (e) => handleEnrollment(courseId, e);
            }
        });
    }

    // =============================================================
    // FILTER HANDLING
    // =============================================================
    filterButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
            filterButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filter = btn.dataset.filter;
            currentFilter = filter;

            if (filter === 'all') {
                renderCourses(allCourses);
            } else {
                const filtered = allCourses.filter(course =>
                    course.category && course.category === filter
                );
                renderCourses(filtered);
            }
        });
    });

    // =============================================================
    // INITIALIZE
    // =============================================================
    document.addEventListener('DOMContentLoaded', loadCourses);
</script>
