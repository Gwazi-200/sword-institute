<script type="module">
    import {
        auth,
        db,
        onAuthStateChanged,
        signOut,
        collection,
        query,
        where,
        getDocs,
        doc,
        getDoc
    } from './firebase.js';
    
    import {
        getUserEnrollments,
        getEnrolledCoursesWithDetails
    } from './enrollmentService.js';

    // DOM Elements
    const logoutBtn = document.getElementById('logoutBtn');
    const userName = document.getElementById('userName');
    const welcomeMessage = document.getElementById('welcomeMessage');
    const enrolledCoursesEl = document.getElementById('enrolledCourses');
    const completedCoursesEl = document.getElementById('completedCourses');
    const xpPointsEl = document.getElementById('xpPoints');
    const streakDaysEl = document.getElementById('streakDays');
    const aiAdvice = document.getElementById('aiAdvice');
    const activityList = document.getElementById('activityList');

    let currentUserData = null;

    // =============================================================
    // AUTH STATE
    // =============================================================
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        const name = user.displayName || user.email || 'Warrior';
        userName.textContent = name;
        currentUserData = user;
        
        await loadUserDashboard(user.uid);
    });

    // =============================================================
    // LOGOUT
    // =============================================================
    logoutBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        try {
            await signOut(auth);
            window.location.href = 'index.html';
        } catch (error) {
            console.error('Logout error:', error);
            alert('Error logging out. Please try again.');
        }
    });

    // =============================================================
    // LOAD USER DASHBOARD
    // =============================================================
    async function loadUserDashboard(uid) {
        try {
            // Get all enrollments with course details
            const enrollments = await getUserEnrollments(uid);
            
            let enrolledCount = enrollments.length;
            let completedCount = 0;
            let totalXp = 0;
            
            // Get course details for each enrollment
            const courseDetails = [];
            for (const enrollment of enrollments) {
                try {
                    const courseRef = doc(db, 'courses', enrollment.courseId);
                    const courseSnap = await getDoc(courseRef);
                    
                    if (courseSnap.exists()) {
                        const courseData = courseSnap.data();
                        courseDetails.push({
                            ...enrollment,
                            course: courseData
                        });
                        
                        if (enrollment.completed) {
                            completedCount++;
                        }
                        if (enrollment.xpEarned) {
                            totalXp += enrollment.xpEarned;
                        }
                    }
                } catch (error) {
                    console.warn('Could not load course:', enrollment.courseId);
                }
            }
            
            // Update stats
            enrolledCoursesEl.textContent = enrolledCount;
            completedCoursesEl.textContent = completedCount;
            xpPointsEl.innerHTML = `${totalXp} <span class="gold">XP</span>`;
            
            // Streak (simulated - can be pulled from user document)
            streakDaysEl.innerHTML = `7 <span class="gold">🔥</span>`;
            
            // Update AI advice
            updateAIAdvice(enrolledCount, completedCount, courseDetails);
            
            // Update activity list
            updateActivityList(courseDetails);
            
        } catch (error) {
            console.warn('Could not load dashboard data:', error);
            enrolledCoursesEl.textContent = '--';
            completedCoursesEl.textContent = '--';
            xpPointsEl.innerHTML = '-- <span class="gold">XP</span>';
        }
    }

    // =============================================================
    // UPDATE AI ADVICE
    // =============================================================
    function updateAIAdvice(enrolled, completed, courses) {
        if (enrolled === 0) {
            aiAdvice.textContent = `"Enroll in your first course to begin your sacred journey, ${userName.textContent}."`;
        } else if (completed === 0 && enrolled > 0) {
            aiAdvice.textContent = `"You're on the path! Complete your first module to earn 50 XP."`;
        } else if (completed > 0 && completed < enrolled) {
            aiAdvice.textContent = `"Great progress! ${completed} courses completed. Keep going, Warrior."`;
        } else if (completed === enrolled && enrolled > 0) {
            aiAdvice.textContent = `"You've completed all enrolled courses! Time to explore new paths."`;
        } else {
            aiAdvice.textContent = `"You're making excellent progress. Stay focused on your goals."`;
        }
    }

    // =============================================================
    // UPDATE ACTIVITY LIST
    // =============================================================
    function updateActivityList(courses) {
        if (courses.length === 0) {
            activityList.innerHTML = `
                <li class="activity-item">
                    <div class="icon"><i class="fas fa-info-circle"></i></div>
                    <div class="content">
                        <h4>No activity yet</h4>
                        <p>Enroll in a course to get started</p>
                    </div>
                    <span class="time"><a href="courses.html" style="color:var(--violet-deep);">Browse courses →</a></span>
                </li>
            `;
            return;
        }

        // Show last 3 enrolled courses
        const recent = courses.slice(0, 3);
        let html = '';
        
        recent.forEach((item, index) => {
            const courseName = item.course?.title || 'Untitled Course';
            const status = item.completed ? 'Completed' : `${item.progress || 0}% Complete`;
            const icon = item.completed ? 'fa-check-circle' : 'fa-play';
            const iconClass = item.completed ? 'fa-check-circle' : 'fa-play';
            
            html += `
                <li class="activity-item">
                    <div class="icon"><i class="fas ${iconClass}"></i></div>
                    <div class="content">
                        <h4>${item.completed ? 'Completed: ' : 'Learning: '} ${courseName}</h4>
                        <p>${status}</p>
                    </div>
                    <span class="time">${index === 0 ? 'Just now' : index === 1 ? 'Yesterday' : '3 days ago'}</span>
                </li>
            `;
        });
        
        // Add a "View All" link if there are more than 3
        if (courses.length > 3) {
            html += `
                <li class="activity-item" style="justify-content:center;border-bottom:none;">
                    <a href="courses.html" style="color:var(--violet-deep);font-weight:600;text-decoration:none;">
                        View all ${courses.length} courses <i class="fas fa-arrow-right"></i>
                    </a>
                </li>
            `;
        }
        
        activityList.innerHTML = html;
    }
</script>
