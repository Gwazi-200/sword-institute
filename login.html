﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sword Institute | Login</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ---------- ROOT: PEARLESCENT + VIOLET + GOLD ---------- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pearl-light: #FCFAF5;
            --pearl-mid: #F5F2EB;
            --pearl-shadow: #E8E2D8;

            --violet-deep: #8B00FF;
            --violet-glow: rgba(139, 0, 255, 0.12);
            --violet-soft: #A855F7;
            --violet-dark: #3B0764;

            --gold-radiant: #FFD700;
            --gold-soft: #FDE68A;
            --gold-glow: rgba(255, 215, 0, 0.2);

            --text-primary: #1E1029;
            --text-secondary: #4B3A5C;
            --text-muted: #7A6A8A;

            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px rgba(139, 0, 255, 0.06);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 0% 20%, var(--pearl-light), var(--pearl-mid) 60%, var(--pearl-shadow));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 60px -15px rgba(139, 0, 255, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
            padding: 40px 36px;
            position: relative;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--violet-deep);
            top: -120px;
            right: -80px;
        }
        .orb-2 {
            width: 250px;
            height: 250px;
            background: var(--gold-radiant);
            bottom: -80px;
            left: -60px;
            opacity: 0.1;
        }

        .auth-content {
            position: relative;
            z-index: 2;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-header .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 2rem;
            font-weight: 800;
            text-decoration: none;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .auth-header .logo i {
            background: linear-gradient(135deg, var(--violet-deep), var(--gold-radiant));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.4rem;
        }
        .auth-header .logo span {
            background: linear-gradient(135deg, var(--violet-deep), var(--violet-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(139, 0, 255, 0.1);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--violet-deep);
            box-shadow: 0 0 0 4px rgba(139, 0, 255, 0.08);
            background: rgba(255, 255, 255, 0.7);
        }
        .form-group input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .form-options label input[type="checkbox"] {
            accent-color: var(--violet-deep);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .form-options a {
            color: var(--violet-deep);
            text-decoration: none;
            font-weight: 600;
        }
        .form-options a:hover {
            text-decoration: underline;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
        }
        .btn-primary {
            background: var(--violet-deep);
            color: #fff;
            box-shadow: 0 4px 15px rgba(139, 0, 255, 0.25);
        }
        .btn-primary:hover {
            background: #9B1DFF;
            box-shadow: 0 8px 30px rgba(139, 0, 255, 0.35);
            transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--violet-deep);
            text-decoration: none;
            font-weight: 700;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.1);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: #dc2626;
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .error-message i {
            margin-right: 8px;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.1);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: #16a34a;
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .success-message i {
            margin-right: 8px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .auth-wrapper {
                padding: 28px 20px;
                border-radius: var(--radius-lg);
            }
            .auth-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="auth-content">
            <div class="auth-header">
                <a href="index.html" class="logo" data-route="home">
                    <i class="fas fa-shield-halved"></i>
                    Sword<span>Institute</span>
                </a>
                <h1>Welcome Back</h1>
                <p>Sign in to continue your sacred journey</p>
            </div>

            <div id="errorMessage" class="error-message" aria-live="polite">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <div id="successMessage" class="success-message" aria-live="polite">
                <i class="fas fa-check-circle"></i>
                <span id="successText"></span>
            </div>

            <div class="vault-login" style="margin-bottom: 18px;">
                <button type="button" class="btn" style="background: rgba(139, 0, 255, 0.12); color: var(--violet-deep); border: 1px solid rgba(139, 0, 255, 0.25); width: 100%;" id="vaultLoginBtn">
                    <i class="fas fa-key"></i> Vault Login
                </button>
            </div>

            

            <form id="loginForm">

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
                    </div>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe" />
                        Remember me
                    </label>
                    <a href="forgot-password.html">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span id="loginText">Sign In</span>
                    <span id="loginSpinner" style="display:none;"><span class="spinner"></span></span>
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html" data-route="register">Create one</a>
            </div>
        </div>
    </div>

    <script src="js/sharedRoutes.js"></script>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js",
                "firebase/functions": "https://www.gstatic.com/firebasejs/10.14.1/firebase-functions.js"
            }
        }
    </script>


    <script type="module">
        import { auth, onAuthStateChanged } from './js/firebase.js';
        import { loginUser } from './js/services/auth.js';



        // DOM References
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginText = document.getElementById('loginText');
        const loginSpinner = document.getElementById('loginSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');

        const routePath = (name, query) => {
            if (window.SwordRoutes && typeof window.SwordRoutes.path === 'function') {
                return window.SwordRoutes.path(name, { query: query || null });
            }

            const fallback = {
                dashboard: 'dashboard.html'
            };

            const base = fallback[name] || 'dashboard.html';
            if (!query) return base;

            const params = new URLSearchParams(query).toString();
            return params ? `${base}?${params}` : base;
        };

        function applyRouteAnchors() {
            document.querySelectorAll('[data-route]').forEach((node) => {
                const routeName = node.getAttribute('data-route');
                if (!routeName) return;
                node.setAttribute('href', routePath(routeName));
            });
        }

        applyRouteAnchors();

        // Shared global auth listener (sets session + optional page hooks)
        // Falls back to redirect-only behavior.
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Allow shared module hook if present
                if (typeof window.SwordAuthSync?.onUser === 'function') {
                    window.SwordAuthSync.onUser(user);
                }
                window.location.href = routePath('dashboard');
            } else {
                if (typeof window.SwordAuthSync?.onUser === 'function') {
                    window.SwordAuthSync.onUser(null);
                }
            }
        });

        // Vault login (prompt-based) uses the same modular loginUser() as the form.
        const vaultLoginBtn = document.getElementById('vaultLoginBtn');
        if (vaultLoginBtn) {
            vaultLoginBtn.addEventListener('click', async () => {
                errorMessage.classList.remove('show');
                successMessage.classList.remove('show');

                const email = prompt('Enter your email:');
                const password = prompt('Enter your password:');

                if (!email || !password) {
                    showError('Please enter both email and password.');
                    return;
                }

                // Reuse existing UI state for a consistent experience.
                loginBtn.disabled = true;
                loginText.textContent = 'Signing in...';
                loginSpinner.style.display = 'inline-block';

                try {
                    await loginUser(String(email).trim(), String(password));
                    successText.textContent = 'Welcome back! Redirecting...';
                    successMessage.classList.add('show');
                    setTimeout(() => {
                        window.location.href = routePath('dashboard');
                    }, 1500);
                } catch (error) {
                    const code = error?.code;
                    let message = error?.message || 'Invalid email or password. Please try again.';

                    if (code === 'auth/user-not-found') {
                        message = 'No account found with this email address.';
                    } else if (code === 'auth/wrong-password') {
                        message = 'Incorrect password. Please try again.';
                    } else if (code === 'auth/too-many-requests') {
                        message = 'Too many failed attempts. Please try again later.';
                    } else if (code === 'auth/invalid-email') {
                        message = 'Please enter a valid email address.';
                    } else if (code === 'auth/network-request-failed') {
                        message = 'Network error. Please check your internet connection.';
                    }

                    showError(message);
                } finally {
                    loginBtn.disabled = false;
                    loginText.textContent = 'Sign In';
                    loginSpinner.style.display = 'none';
                }
            });
        }

        form.addEventListener('submit', async (e) => {

            e.preventDefault();

            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please fill in all fields.');
                return;
            }

            loginBtn.disabled = true;
            loginText.textContent = 'Signing in...';
            loginSpinner.style.display = 'inline-block';

            try {
                await loginUser(email, password);


                successText.textContent = 'Welcome back! Redirecting...';
                successMessage.classList.add('show');

                setTimeout(() => {
                    window.location.href = routePath('dashboard');
                }, 1500);
            } catch (error) {
                // loginUser() already maps most Firebase error codes to friendly messages.
                const code = error?.code;
                let message = error?.message || 'Invalid email or password. Please try again.';


                if (code === 'auth/user-not-found') {
                    message = 'No account found with this email address.';
                } else if (code === 'auth/wrong-password') {
                    message = 'Incorrect password. Please try again.';
                } else if (code === 'auth/too-many-requests') {
                    message = 'Too many failed attempts. Please try again later.';
                } else if (code === 'auth/invalid-email') {
                    message = 'Please enter a valid email address.';
                } else if (code === 'auth/network-request-failed') {
                    message = 'Network error. Please check your internet connection.';
                }

                showError(message);
            } finally {
                loginBtn.disabled = false;
                loginText.textContent = 'Sign In';
                loginSpinner.style.display = 'none';
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
        }

        console.log('🔐 Login page initialized successfully (modular Firebase)');
    </script>
</body>
</html>
