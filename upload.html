<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Courses</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #F5F2EB;
            padding: 40px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        h1 { color: #8B00FF; }
        .status { 
            margin: 20px 0;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            text-align: left;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #8B00FF, #FFD700);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }
        .btn {
            padding: 14px 40px;
            border-radius: 60px;
            border: none;
            background: #8B00FF;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.02);
            background: #9B1DFF;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .success { color: #16a34a; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Upload All Courses</h1>
        <p>This will upload all 18 courses with 54 lessons to Firestore</p>

        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>

        <div class="status" id="status">Ready to upload...</div>

        <button class="btn" id="uploadBtn">🚀 Start Upload</button>
    </div>

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>

    <script>
        // =============================================================
        // FIREBASE CONFIG
        // =============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD6lVyvaA7uhcX3qvxvOp3dqiGxb8Td4xs",
            authDomain: "sword-institute-lms.firebaseapp.com",
            projectId: "sword-institute-lms",
            storageBucket: "sword-institute-lms.firebasestorage.app",
            messagingSenderId: "478896038426",
            appId: "1:478896038426:web:c24c6373edc1cba14a67a3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // =============================================================
        // DOM Elements
        // =============================================================
        const statusDiv = document.getElementById('status');
        const progressFill = document.getElementById('progressFill');
        const uploadBtn = document.getElementById('uploadBtn');

        // =============================================================
        // ALL 18 COURSES DATA
        // =============================================================
        const allCourses = {
            'administration-and-management': {
                title: 'Administration and Management',
                description: 'Learn effective administration and management skills for community organizations',
                category: 'Management & Administration',
                duration: '8 weeks',
                level: 'Intermediate',
                icon: 'fa-users-cog',
                order: 1,
                lessons: [
                    {
                        id: 'lesson-1',
                        title: 'Introduction to Management',
                        description: 'Understanding the fundamentals of management',
                        duration: '25 min',
                        xp: 10,
                        order: 1,
                        content: `<h2>Introduction to Management</h2>
        <p>Management is the process of planning, organizing, leading, and controlling resources to achieve organizational goals.</p>
        <div class="definition-box"><span class="term">Management:</span> The act of getting people together to accomplish desired goals and objectives using available resources efficiently and effectively.</div>
        <h3>Key Management Functions</h3>
        <div class="highlight-box"><span class="label">📋 The Five Functions of Management</span>
        <ul><li><strong>Planning:</strong> Setting goals and determining how to achieve them</li><li><strong>Organizing:</strong> Arranging resources to achieve goals</li><li><strong>Leading:</strong> Guiding and motivating people</li><li><strong>Controlling:</strong> Monitoring and evaluating progress</li><li><strong>Staffing:</strong> Recruiting and developing the right people</li></ul></div>
        <h3>Why Management Matters</h3>
        <div class="key-points"><span class="title">🎯 Key Benefits of Effective Management</span>
        <ul><li><strong>Goal Achievement:</strong> Helps organizations reach their objectives</li><li><strong>Resource Optimization:</strong> Ensures efficient use of resources</li><li><strong>Productivity:</strong> Increases efficiency and output</li><li><strong>Innovation:</strong> Encourages new ideas and approaches</li><li><strong>Sustainability:</strong> Ensures long-term organizational health</li></ul></div>
        <div class="highlight-box gold"><span class="label">✍️ Practice Exercise</span><p>Think about a management challenge in your community or organization. How would you address it?</p></div>`
                    },
                    {
                        id: 'lesson-2',
                        title: 'Management Functions in Practice',
                        description: 'Applying management functions in real-world situations',
                        duration: '30 min',
                        xp: 10,
                        order: 2,
                        content: `<h2>Management Functions in Practice</h2>
        <p>Understanding how management functions apply in real-world organizational settings.</p>
        <div class="highlight-box"><span class="label">🏢 The Management Process</span><p>Effective managers integrate all five functions into a continuous cycle: Plan → Organize → Lead → Control → Staff</p></div>
        <h3>Case Study: Community Health Program</h3>
        <div class="definition-box"><p>A community health organization wants to launch a new malaria prevention program. How would a manager apply management functions?</p></div>
        <div class="key-points"><span class="title">💡 Application of Functions</span>
        <ul><li><strong>Planning:</strong> Set goals, identify resources, create timeline</li><li><strong>Organizing:</strong> Assign roles, coordinate partners, secure funding</li><li><strong>Leading:</strong> Motivate team, communicate vision, resolve conflicts</li><li><strong>Controlling:</strong> Monitor progress, evaluate outcomes, adjust as needed</li><li><strong>Staffing:</strong> Recruit volunteers, train community health workers</li></ul></div>`
                    },
                    {
                        id: 'lesson-3',
                        title: 'Personnel Management and Administration',
                        description: 'Understanding human resource management in organizations',
                        duration: '35 min',
                        xp: 10,
                        order: 3,
                        content: `<h2>Personnel Management and Administration</h2>
        <p>Personnel management focuses on the human factor in organizations - recruiting, developing, and managing employees.</p>
        <div class="definition-box"><span class="term">Personnel Management:</span> The administrative function that deals with the organization's employees, including recruitment, training, compensation, and performance management.</div>
        <h3>Key Components of Personnel Management</h3>
        <div class="highlight-box"><span class="label">👥 Core Functions</span>
        <ul><li><strong>Recruitment:</strong> Attracting qualified candidates</li><li><strong>Selection:</strong> Choosing the right people for the job</li><li><strong>Training and Development:</strong> Building employee skills</li><li><strong>Performance Management:</strong> Evaluating and improving performance</li><li><strong>Compensation and Benefits:</strong> Fair and motivating rewards</li><li><strong>Employee Relations:</strong> Maintaining positive workplace relationships</li></ul></div>`
                    }
                ]
            },
            'communication-skills': {
                title: 'Communication Skills',
                description: 'Master effective communication for professional and community settings',
                category: 'Communication',
                duration: '6 weeks',
                level: 'Beginner',
                icon: 'fa-comment-dots',
                order: 2,
                lessons: [
                    {
                        id: 'lesson-1',
                        title: 'Introduction to Communication',
                        description: 'Understanding the basics of effective communication',
                        duration: '25 min',
                        xp: 10,
                        order: 1,
                        content: `<h2>Introduction to Communication</h2>
        <p>Communication is the foundation of all human interaction. It is the process of exchanging information, ideas, thoughts, and feelings between people.</p>
        <div class="definition-box"><span class="term">Communication:</span> The process of sending and receiving messages through verbal and non-verbal means.</div>
        <h3>Key Elements of Communication</h3>
        <div class="highlight-box"><span class="label">📋 The Communication Process</span>
        <ul><li><strong>Sender:</strong> The person who initiates the message</li><li><strong>Message:</strong> The information being shared</li><li><strong>Channel:</strong> The medium used to send the message</li><li><strong>Receiver:</strong> The person who receives the message</li><li><strong>Feedback:</strong> The response from the receiver</li></ul></div>
        <h3>Why Communication Matters</h3>
        <div class="key-points"><span class="title">🎯 Importance of Effective Communication</span>
        <ul><li><strong>Builds Relationships:</strong> Connects people and builds trust</li><li><strong>Facilitates Understanding:</strong> Ensures messages are clear and accurate</li><li><strong>Enables Cooperation:</strong> Helps people work together effectively</li><li><strong>Prevents Conflict:</strong> Reduces misunderstandings</li><li><strong>Empowers Communities:</strong> Enables participation and advocacy</li></ul></div>`
                    },
                    {
                        id: 'lesson-2',
                        title: 'Verbal Communication',
                        description: 'Mastering spoken communication skills',
                        duration: '30 min',
                        xp: 10,
                        order: 2,
                        content: `<h2>Verbal Communication</h2>
        <p>Verbal communication involves the use of words to share information, ideas, and feelings through spoken language.</p>
        <div class="definition-box"><span class="term">Verbal Communication:</span> The use of spoken words to convey messages, ideas, and emotions.</div>
        <h3>Key Aspects of Verbal Communication</h3>
        <div class="highlight-box"><span class="label">🎤 Essential Elements</span>
        <ul><li><strong>Clarity:</strong> Speaking clearly and using simple language</li><li><strong>Conciseness:</strong> Getting to the point without unnecessary words</li><li><strong>Confidence:</strong> Speaking with conviction and authority</li><li><strong>Active Listening:</strong> Paying attention and responding appropriately</li><li><strong>Tone:</strong> Using appropriate tone and volume</li></ul></div>
        <h3>Tips for Effective Verbal Communication</h3>
        <div class="key-points"><span class="title">💡 Best Practices</span>
        <ul><li>Think before you speak</li><li>Use appropriate tone and volume</li><li>Maintain eye contact</li><li>Ask clarifying questions</li><li>Practice active listening</li></ul></div>`
                    },
                    {
                        id: 'lesson-3',
                        title: 'Non-Verbal Communication',
                        description: 'Understanding body language and non-verbal cues',
                        duration: '25 min',
                        xp: 10,
                        order: 3,
                        content: `<h2>Non-Verbal Communication</h2>
        <p>Non-verbal communication includes body language, facial expressions, gestures, and other cues that convey meaning without words.</p>
        <div class="definition-box"><span class="term">Non-Verbal Communication:</span> The transmission of messages without words, through body language, facial expressions, and gestures.</div>
        <h3>Types of Non-Verbal Communication</h3>
        <div class="highlight-box"><span class="label">👁️ Key Types</span>
        <ul><li><strong>Body Language:</strong> Posture, movements, and gestures</li><li><strong>Facial Expressions:</strong> Smiles, frowns, raised eyebrows</li><li><strong>Eye Contact:</strong> Looking directly at someone</li><li><strong>Personal Space:</strong> The distance maintained during interaction</li><li><strong>Touch:</strong> Handshakes, pats on the back</li><li><strong>Paralanguage:</strong> Tone, pitch, and speed of voice</li></ul></div>`
                    }
                ]
            }
            // ... Add all other courses here. I'll provide the full version below
        };

        // =============================================================
        // UPLOAD FUNCTION
        // =============================================================
        async function uploadAllCourses() {
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            let totalCourses = 0;
            let totalLessons = 0;
            const courseKeys = Object.keys(allCourses);
            const total = courseKeys.length;

            statusDiv.textContent = '🚀 Starting upload...\n';

            for (let i = 0; i < courseKeys.length; i++) {
                const courseId = courseKeys[i];
                const courseData = allCourses[courseId];

                try {
                    // Update progress
                    const progress = ((i + 1) / total) * 100;
                    progressFill.style.width = progress + '%';

                    // Upload course
                    await db.collection('courses')
                        .doc(courseId)
                        .set({
                            title: courseData.title,
                            description: courseData.description,
                            category: courseData.category,
                            duration: courseData.duration,
                            level: courseData.level,
                            icon: courseData.icon,
                            order: courseData.order,
                            totalLessons: courseData.lessons.length,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });

                    statusDiv.textContent += `✅ Uploaded: ${courseData.title}\n`;
                    totalCourses++;

                    // Upload lessons
                    for (const lesson of courseData.lessons) {
                        await db.collection('courses')
                            .doc(courseId)
                            .collection('lessons')
                            .doc(lesson.id)
                            .set({
                                title: lesson.title,
                                description: lesson.description,
                                duration: lesson.duration,
                                xp: lesson.xp,
                                order: lesson.order,
                                content: lesson.content,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        totalLessons++;
                    }

                    statusDiv.textContent += `  📝 Added ${courseData.lessons.length} lessons\n`;

                } catch (error) {
                    statusDiv.textContent += `❌ Error: ${courseId} - ${error.message}\n`;
                }
            }

            progressFill.style.width = '100%';
            statusDiv.textContent += `\n🎉 COMPLETE!\n`;
            statusDiv.textContent += `📚 ${totalCourses} courses uploaded\n`;
            statusDiv.textContent += `📝 ${totalLessons} lessons uploaded\n`;
            statusDiv.textContent += `\n🔄 Refresh your course page to see everything!`;

            uploadBtn.disabled = false;
            uploadBtn.textContent = '✅ Done!';
        }

        // =============================================================
        // EVENT LISTENER
        // =============================================================
        uploadBtn.addEventListener('click', uploadAllCourses);

        console.log('📚 Upload page ready. Click the button to start!');
    </script>
</body>
</html>
