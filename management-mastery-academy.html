<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professor SWORD ⚔️ · Management Mastery Academy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --primary: #0f172a;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --success: #16a34a;
      --success-light: #f0fdf4;
      --danger: #dc2626;
      --dark-text: #334155;
      --light-bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --sword-glow: rgba(37, 99, 235, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--light-bg);
      font-family: 'Inter', sans-serif;
      color: var(--dark-text);
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
    }

    /* Animated Professor SWORD Title Header Component */
    .dashboard-header {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .brand-group {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .sword-avatar {
      font-size: 2.5rem;
      display: inline-block;
      animation: swordFloat 3s ease-in-out infinite alternate, swordGlow 2s ease-in-out infinite alternate;
      padding: 0.5rem;
      border-radius: 50%;
      background: var(--accent-light);
    }

    @keyframes swordFloat {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-8px) rotate(5deg); }
    }

    @keyframes swordGlow {
      0% { box-shadow: 0 0 5px var(--sword-glow); }
      100% { box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .panels-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .progress-panel, .score-panel {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--accent-light);
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      border: 1px solid #bfdbfe;
      font-size: 0.85rem;
    }

    .score-panel {
      background: #fef3c7;
      border-color: #fde68a;
      color: #92400e;
      font-weight: 700;
    }

    .bar-outer {
      width: 120px;
      height: 8px;
      background: #cbd5e1;
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-inner {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    .btn-download-pdf {
      background: var(--success);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
    }

    .btn-download-pdf:hover:not(:disabled) {
      background: #15803d;
      transform: translateY(-1px);
    }

    .btn-download-pdf:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* Course Architecture Grid Layout */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 2rem;
    }

    .lesson-card {
      background: var(--card-bg);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.02);
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .lesson-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
    }

    .lesson-card.completed {
      border-top: 5px solid var(--success);
    }

    .card-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
    }

    .module-tag {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      background: var(--accent-light);
      color: var(--accent);
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 0.3rem;
    }

    .card-header h3 {
      font-size: 1.25rem;
      color: var(--primary);
    }

    /* Structural Tab Navigation Controls */
    .tab-nav {
      display: flex;
      background: #f1f5f9;
      padding: 0.25rem;
      gap: 0.2rem;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }

    .tab-btn.active {
      background: var(--card-bg);
      color: var(--accent);
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    /* Core Content Windows */
    .card-body {
      padding: 1.2rem;
      flex: 1;
      overflow-y: auto;
      max-height: 440px;
      min-height: 440px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.2s ease-in-out;
    }

    .literature-view p {
      font-size: 0.88rem;
      color: #334155;
      margin-bottom: 0.6rem;
      text-align: justify;
    }

    /* Accessible Text-To-Speech Interface Deck */
    .tts-deck {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f8fafc;
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      margin-bottom: 0.75rem;
    }

    .tts-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .tts-btn.playing {
      background: #dc2626;
    }

    .references {
      font-size: 0.72rem;
      color: #94a3b8;
      border-top: 1px dashed var(--border);
      padding-top: 0.5rem;
      margin-top: 0.6rem;
    }

    /* Graded Interactive Sub-systems */
    .graded-section {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem;
      margin-bottom: 0.85rem;
    }

    .section-lbl {
      font-size: 0.72rem;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
    }

    .points-badge {
      background: #e0f2fe;
      color: #0369a1;
      padding: 0.1rem 0.4rem;
      border-radius: 6px;
      font-weight: bold;
    }

    /* Inline SVG Visual Infographic Canvas Wrapper */
    .visual-container {
      width: 100%;
      height: 150px;
      background: #ffffff;
      border-radius: 8px;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #cbd5e1;
      padding: 0.5rem;
    }

    .visual-container svg {
      width: 100%;
      height: 100%;
    }

    .options-stack {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .opt-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 0.45rem 0.7rem;
      border-radius: 6px;
      font-size: 0.8rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
    }

    .opt-btn:hover:not(:disabled) {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    .opt-btn.correct-choice {
      background: var(--success-light) !important;
      border-color: var(--success) !important;
      color: var(--success) !important;
      font-weight: 600;
    }

    .opt-btn.wrong-choice {
      background: #fde8e8 !important;
      border-color: var(--danger) !important;
      color: var(--danger) !important;
    }

    .feedback-msg {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      font-weight: 500;
    }

    /* Extensible Multi-AI Interoperability Matrix Studio */
    .coach-panel {
      background: #0f172a;
      border-radius: 12px;
      padding: 0.85rem;
      color: #e2e8f0;
      min-height: 400px;
      display: flex;
      flex-direction: column;
    }

    .ai-routing-mesh {
      display: flex;
      gap: 0.25rem;
      background: #1e293b;
      padding: 0.2rem;
      border-radius: 8px;
      margin-bottom: 0.6rem;
    }

    .ai-node-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: #94a3b8;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 0.3rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ai-node-btn.active-node {
      background: var(--accent);
      color: white;
    }

    .chat-window {
      flex: 1;
      background: rgba(255,255,255,0.03);
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 0.6rem;
      min-height: 220px;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .chip-flex {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .chip-action {
      background: #334155;
      color: #f1f5f9;
      border: 1px solid #475569;
      padding: 0.3rem 0.6rem;
      font-size: 0.72rem;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chip-action:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Footer Controllers */
    .card-footer {
      padding: 0.85rem 1.2rem;
      border-top: 1px solid var(--border);
      background: #fafbfc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-capsule {
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
    }

    .access-notice {
      margin-bottom: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      border: 1px dashed #93c5fd;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 0.9rem;
      display: none;
    }

    .guest-locked {
      filter: blur(3px) saturate(0.7);
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .course-grid { grid-template-columns: 1fr; }
      .dashboard-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="access-notice" id="accessNotice"></div>
  <div class="dashboard-header">
    <div class="brand-group">
      <div class="sword-avatar">⚔️</div>
      <div>
        <h1>Professor SWORD Academy</h1>
        <p style="color: #64748b; font-size: 0.85rem;">Continuous Multi-AI Interoperability Loop • Mathematical 100-Mark Scale</p>
      </div>
    </div>
    <div class="panels-group">
      <div class="progress-panel">
        <strong>Progress:</strong>
        <div class="bar-outer"><div class="bar-inner" id="progressFill"></div></div>
        <span id="progressTxt">0 / 8 Modules</span>
      </div>
      <div class="score-panel">
        <i class="fa-solid fa-trophy"></i> Cumulative Score: <span id="totalScoreTxt">0.00</span> / 100 Marks
      </div>
      <button class="btn-download-pdf" id="pdfBtn" onclick="generateAcademicPDF()" disabled>
        <i class="fa-solid fa-file-pdf"></i> Export Official Transcript
      </button>
    </div>
  </div>

  <div class="course-grid" id="masteryGrid"></div>
</div>

<script src="js/localAuthGuard.js"></script>
<script>
  /**
   * Application State Ledger
   * Pure decoupled structural tracking modeling individual question configurations.
   * Airtight grading allocation: 3 items per module equal exactly 12.5 marks. (12.5 * 8 = 100)
   */
  const userProgressState = {
    studentName: "Michael",
    scores: {}, // Format: { "moduleId_component": value }
    completedModules: new Set(),
    activeTTSUtterance: null
  };

  let localAccessState = { isAuthenticated: false, isGuest: false, user: null };

  function applyPageAccess() {
    localAccessState = window.SwordLocalAuth
      ? window.SwordLocalAuth.enforce({
          allowGuest: true,
          redirectTo: 'courses.html',
          onBlocked: () => {
            window.location.href = 'courses.html';
          }
        })
      : localAccessState;

    const notice = document.getElementById('accessNotice');
    const grid = document.getElementById('masteryGrid');
    const pdfBtn = document.getElementById('pdfBtn');

    if (!notice || !grid || !pdfBtn) return;

    if (localAccessState.isAuthenticated) {
      notice.style.display = 'none';
      grid.classList.remove('guest-locked');
      return;
    }

    if (localAccessState.isGuest) {
      notice.style.display = 'block';
      notice.innerHTML = '<strong>Guest Preview Active.</strong> Module interaction and transcript export are disabled until login.';
      grid.classList.add('guest-locked');
      pdfBtn.setAttribute('disabled', 'disabled');
      return;
    }

    window.location.href = 'courses.html';
  }

  const coreDataset = [
    {
      id: 1,
      title: "Introduction to Management",
      subtitle: "Evolution of Management Thought & Foundations",
      paragraphs: [

        "The historical roadmap transitions from early Classical schools to later Behavioral paradigms. Frederick Taylor's Scientific Management targeted production line optimization, while Henri Fayol designed high-level corporate frameworks like unity of organizational command. This machine-centric perspective changed during Elton Mayo's Hawthorne Studies, showing that workplace attention and community interaction drive labor optimization much more than functional metrics.",
        "Modern systems view organizations as complex, open environments interacting directly with fluid economic frameworks. Contingency models state that standardized absolute solutions are non-existent; executive operations must match the real-world operational context, technological ecosystem, and industry conditions."
      ],
      references: "Drucker, P. F. (1954). The Practice of Management; Taylor, F. W. (1911). Principles of Scientific Management.",
      infographicSvg: `
        <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
          <rect width="100%" height="100%" fill="#f8fafc" rx="6"/>
          <line x1="40" y1="60" x2="360" y2="60" stroke="#cbd5e1" stroke-width="4" />
          <circle cx="60" cy="60" r="18" fill="#2563eb" />
          <text x="60" y="65" font-family="sans-serif" font-size="10" fill="white" font-weight="bold" text-anchor="middle">CLASSIC</text>
          <circle cx="200" cy="60" r="18" fill="#16a34a" />
          <text x="200" y="65" font-family="sans-serif" font-size="10" fill="white" font-weight="bold" text-anchor="middle">BEHAVIOR</text>
          <circle cx="340" cy="60" r="18" fill="#7c3aed" />
          <text x="340" y="65" font-family="sans-serif" font-size="10" fill="white" font-weight="bold" text-anchor="middle">SYSTEMS</text>
          <text x="200" y="110" font-family="sans-serif" font-size="11" fill="#334155" text-anchor="middle" font-weight="600">Evolution Vector of Corporate Management Models</text>
        </svg>
      `,
      visualQuestion: "Which era focuses on corporate process mapping to optimize physical throughput parameters?",
      visualChoices: ["Classical System Engineering Metrics", "Behavioral Human-Centric Systems", "Modern Open Ecosystem Paradigms"],
      visualCorrect: 0,
      simulator: {
        scenario: "Your manufacturing line throughput drops 15% due to workplace labor friction and aggressive scheduling metrics. What step do you execute?",
        choices: ["Enforce strict machine speed metrics and issue mandatory output quotas.", "Initiate psychological feedback loops and structural breaks."],
        correctIdx: 1,
        feedback: ["❌ Fail. Pure performance metrics without human parameters compound workforce exhaustion.", "✨ Success (+5.0 Marks)! Activating behavioral feedback systems channels Hawthorne efficiencies."]
      },
      quiz: {
        q: "Which management theorist introduced corporate functional principles across corporate operations?",
        choices: ["Frederick Taylor", "Henri Fayol", "Elton Mayo"],
        correctIdx: 1,
        feedback: ["❌ Incorrect. Taylor handled micro-level industrial manufacturing metrics.", "✨ Correct (+4.5 Marks)! Fayol constructed high-level enterprise administrative frameworks.", "❌ Incorrect. Mayo spearheaded the behavioral human relations studies."]
      },
      aiCoach: {
        "SWORD": "Greetings. I am Professor SWORD ⚔️. Systems theory mandates that organizations do not run in a vacuum. Everything maps back to environmental inputs.",
        "FinanceBot": "Analyzing financial allocations: Classical systems maximized output parameters but incurred massive indirect human resource attrition overhead costs.",
        "OpsBot": "Operational Analysis: Optimizing line layout throughput means shifting from rigid isolation to high-agility production frameworks.",
        "HRBuddy": "People Metrics: Mayo verified that when staff understand that management values their insight, retention parameters spike."
      }
    },
    {
      id: 2,
      title: "Management Functions",
      subtitle: "Deep Dive into the POLC Framework Cycle",
      paragraphs: [
        "The practical deployment of managerial strategic intent runs through the interconnected POLC framework. Planning establishes an organization's path by setting goals and creating steps to achieve them. This requires ongoing environmental scanning and predictive risk mitigation to shield long-range workflows from market volatility.",
        "Organizing structures resource allocation, defining communication pathways, lines of accountability, and task distributions. Leading focuses on motivation, using clear organizational vision and emotional intelligence to direct individuals and groups toward targets.",
        "Controlling completes the operational loop. It requires managers to establish performance benchmarks, evaluate current productivity against planning data, and implement swift corrective changes when tracking systems show variance from standard metrics."
      ],
      references: "Fayol, H. (1916). Administration Industrielle et Générale; Robbins, S. P. (2024). Management.",
      infographicSvg: `
        <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">

      visualCorrect: 1,
      simulator: {

        correctIdx: 0,

      quiz: {
        q: "What control mechanism manages system assets and material feeds before a workflow sequence executes?",
        choices: ["Feedback Control", "Feedforward Control", "Concurrent Control"],
        correctIdx: 1,
        feedback: ["❌ Incorrect. Feedback models process post-execution data.", "✨ Correct (+4.5 Marks)! Feedforward operations filter incoming operational risks before production phases.", "❌ Incorrect. Concurrent controllers evaluate execution systems in real time."]
      },
      aiCoach: {
        "SWORD": "Control cycles ensure organizational reality matches your blueprints. Missing milestones requires real-time calibration.",
        "FinanceBot": "Operational controlling matrices require a clear data baseline to shield bottom-line margins from expanding variance costs.",
        "OpsBot": "Feedforward validation rules check supplier specifications before items enter production inventory slots.",

      }
    },
    {
      id: 3,
      title: "Personnel Management",
      subtitle: "Strategic HRM & Human Capital Architecture",
      paragraphs: [
        "Personnel management has grown from basic administrative record-keeping into Strategic Human Resource Management (SHRM). Modern SHRM treats workers as important business assets that must align with the organization's macro goals. This system guides talent matching from initial onboarding to retirement.",
        "Core workflows cover talent sourcing, competency-based recruitment, onboarding, continuous learning tracks, and structured performance metrics. Effective review cycles avoid generic report cards, focusing instead on 360-degree feedback loops and performance management systems linked to business objectives.",
        "Modern human capital management also prioritizes workplace diversity, employee experience metrics, and data-driven workforce planning. Using HR analytics helps teams spot turnover risks early, optimize benefits packages, and build inclusive workplace cultures that retain top talent."
      ],
      references: "Ulrich, D. (1997). Human Resource Champions; Boxall, P. (2011). Strategy and HRM.",
      infographicSvg: `
        <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">

          <circle cx="200" cy="50" r="12" fill="#2563eb"/>
          <circle cx="200" cy="15" r="8" fill="#16a34a"/>
          <circle cx="200" cy="85" r="8" fill="#16a34a"/>

  function switchCardTab(moduleId, tabKey, event) {
    if (!event || !event.currentTarget) return;
    
    const card = document.getElementById(`card-mod-${moduleId}`);
    if (!card) return;

    // Reset current active classes
    const buttons = card.querySelectorAll(".tab-btn");
    buttons.forEach(btn => btn.classList.remove("active"));
    
    const contents = card.querySelectorAll(".tab-content");
    contents.forEach(content => content.classList.remove("active"));

    // Activate selected target components
    event.currentTarget.classList.add("active");
    
    const targetMap = {
      'literature': `tab-lit-${moduleId}`,
      'visual': `tab-vis-${moduleId}`,
      'simulator': `tab-sim-${moduleId}`,
      'quiz': `tab-qz-${moduleId}`,
      'coach': `tab-co-${moduleId}`
    };

    const targetId = targetMap[tabKey];
    if (targetId) {
      const targetElement = document.getElementById(targetId);
      if (targetElement) {
        targetElement.classList.add("active");
      }
    }
  }

  /**
   * Accessible Web Speech Synthesis Engine
   */
  function executeTextToSpeech(moduleId) {
    const activeBtn = document.getElementById(`tts-btn-${moduleId}`);
    
    if (window.speechSynthesis && window.speechSynthesis.speaking) {
      window.speechSynthesis.cancel();
      if (userProgressState.activeTTSUtterance === moduleId) {
        setTtsButtonState(moduleId, false);
        userProgressState.activeTTSUtterance = null;
        return;
      }
    }

    // Reset previous buttons
    if (userProgressState.activeTTSUtterance !== null) {
      setTtsButtonState(userProgressState.activeTTSUtterance, false);
    }

    const textPayloadElement = document.getElementById(`lit-text-${moduleId}`);
    if (!textPayloadElement) return;
    
    const textPayload = textPayloadElement.innerText;
    if (!window.speechSynthesis) return;
    
    const utterance = new SpeechSynthesisUtterance(textPayload);
    
    utterance.onend = () => {
      setTtsButtonState(moduleId, false);
      userProgressState.activeTTSUtterance = null;
    };
    
    utterance.onerror = () => {
      setTtsButtonState(moduleId, false);
      userProgressState.activeTTSUtterance = null;
    };

    setTtsButtonState(moduleId, true);
    userProgressState.activeTTSUtterance = moduleId;
    window.speechSynthesis.speak(utterance);
  }

  function setTtsButtonState(moduleId, isPlaying) {
    const btn = document.getElementById(`tts-btn-${moduleId}`);
    if (!btn) return;
    if (isPlaying) {
      btn.classList.add("playing");
      btn.innerHTML = `<i class="fa-solid fa-square"></i> Stop Lecture`;
    } else {
      btn.classList.remove("playing");
      btn.innerHTML = `<i class="fa-solid fa-volume-high"></i> Audio Lecture`;
    }
  }

  /**
   * Multi-AI Orchestrator Interoperability Routing Matrix
   */
  function routeAiContext(moduleId, targetAiNode) {
    const moduleData = coreDataset.find(m => m.id === moduleId);
    if (!moduleData) return;

    const panel = document.getElementById(`tab-co-${moduleId}`);
    if (!panel) return;
    
    const buttons = panel.querySelectorAll(".ai-node-btn");
    buttons.forEach(btn => btn.classList.remove("active-node"));

    const activeButton = document.getElementById(`node-btn-${moduleId}-${targetAiNode}`);
    if (activeButton) {
      activeButton.classList.add("active-node");
    }

    const chatWindow = document.getElementById(`ai-chat-window-${moduleId}`);
    if (!chatWindow) return;
    
    const emojiMap = { 'SWORD': '⚔️', 'FinanceBot': '📊', 'OpsBot': '⚙️', 'HRBuddy': '👥' };
    
    chatWindow.innerHTML = `<strong>[${targetAiNode} ${emojiMap[targetAiNode]}]:</strong> ${moduleData.aiCoach[targetAiNode]}`;
  }

  function injectPromptPreset(moduleId, presetAction) {
    const chatWindow = document.getElementById(`ai-chat-window-${moduleId}`);
    if (!chatWindow) return;
    
    const tabContent = document.getElementById(`tab-co-${moduleId}`);
    if (!tabContent) return;
    
    const activeNodeBtn = tabContent.querySelector(".ai-node-btn.active-node");
    if (!activeNodeBtn) return;
    
    const nodeName = activeNodeBtn.id.split('-').pop();
    
    chatWindow.innerHTML += `
      <div style="margin-top:0.5rem; padding-top:0.5rem; border-top:1px dashed rgba(255,255,255,0.1); color:#38bdf8;">
        <em>Query executed: "${presetAction}"...</em>
      </div>
      <div style="margin-top:0.3rem; color:#a7f3d0;">
        <strong>[${nodeName} System Response]:</strong> Contextual parameters analyzed for "${presetAction}". Process variables verified against standard management frameworks.
      </div>
    `;
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  /**
   * Academic Grading Engine
   * Validates selections and calculates scores against the mathematical 100-mark system.
   */
  function verifyVisualAnswer(moduleId, pickedIdx, correctIdx, element) {
    const targetGroup = document.querySelectorAll(`.class-vis-btn-${moduleId}`);
    if (!targetGroup.length) return;
    
    targetGroup.forEach(btn => btn.disabled = true);

    const feedbackField = document.getElementById(`vis-fb-${moduleId}`);
    if (!feedbackField) return;
    
    const scoreKey = `${moduleId}_vis`;

    if (pickedIdx === correctIdx) {
      element.classList.add("correct-choice");
      feedbackField.innerHTML = `<span style="color:var(--success);">✨ Correct (+3.0 Marks)! Visual concept mapping parameters validated.</span>`;
      userProgressState.scores[scoreKey] = 3.0;
    } else {
      element.classList.add("wrong-choice");
      if (targetGroup[correctIdx]) {
        targetGroup[correctIdx].classList.add("correct-choice");
      }
      feedbackField.innerHTML = `<span style="color:var(--danger);">❌ Incorrect (0.0 Marks). Review the vector illustration models.</span>`;
      userProgressState.scores[scoreKey] = 0.0;
    }
    evaluateModuleStatus(moduleId);
  }

  function verifySimulatorAnswer(moduleId, pickedIdx, correctIdx, element) {
    const targetGroup = document.querySelectorAll(`.class-sim-btn-${moduleId}`);
    if (!targetGroup.length) return;
    
    targetGroup.forEach(btn => btn.disabled = true);

    const feedbackField = document.getElementById(`sim-fb-${moduleId}`);
    if (!feedbackField) return;
    
    const targetModule = coreDataset.find(m => m.id === moduleId);
    if (!targetModule) return;
    
    const scoreKey = `${moduleId}_sim`;

    if (pickedIdx === correctIdx) {
      element.classList.add("correct-choice");
      userProgressState.scores[scoreKey] = 5.0;
    } else {
      element.classList.add("wrong-choice");
      if (targetGroup[correctIdx]) {
        targetGroup[correctIdx].classList.add("correct-choice");
      }
      userProgressState.scores[scoreKey] = 0.0;
    }
    
    if (targetModule.simulator && targetModule.simulator.feedback && targetModule.simulator.feedback[pickedIdx]) {
      feedbackField.innerHTML = `<span>${targetModule.simulator.feedback[pickedIdx]}</span>`;
    }
    evaluateModuleStatus(moduleId);
  }

  function verifyQuizAnswer(moduleId, pickedIdx, correctIdx, element) {
    const targetGroup = document.querySelectorAll(`.class-qz-btn-${moduleId}`);
    if (!targetGroup.length) return;
    
    targetGroup.forEach(btn => btn.disabled = true);

    const feedbackField = document.getElementById(`qz-fb-${moduleId}`);
    if (!feedbackField) return;
    
    const targetModule = coreDataset.find(m => m.id === moduleId);
    if (!targetModule) return;
    
    const scoreKey = `${moduleId}_qz`;

    if (pickedIdx === correctIdx) {
      element.classList.add("correct-choice");
      userProgressState.scores[scoreKey] = 4.5;
    } else {
      element.classList.add("wrong-choice");
      if (targetGroup[correctIdx]) {
        targetGroup[correctIdx].classList.add("correct-choice");
      }
      userProgressState.scores[scoreKey] = 0.0;
    }
    
    if (targetModule.quiz && targetModule.quiz.feedback && targetModule.quiz.feedback[pickedIdx]) {
      feedbackField.innerHTML = `<span>${targetModule.quiz.feedback[pickedIdx]}</span>`;
    }
    evaluateModuleStatus(moduleId);
  }

  function evaluateModuleStatus(moduleId) {
    const scoreKeyVis = `${moduleId}_vis`;
    const scoreKeySim = `${moduleId}_sim`;
    const scoreKeyQz  = `${moduleId}_qz`;

    // A module is complete if all three components are graded
    if (userProgressState.scores.hasOwnProperty(scoreKeyVis) && 
        userProgressState.scores.hasOwnProperty(scoreKeySim) && 
        userProgressState.scores.hasOwnProperty(scoreKeyQz)) {
      
      userProgressState.completedModules.add(moduleId);
      const cardElement = document.getElementById(`card-mod-${moduleId}`);
      if (cardElement) {
        cardElement.classList.add("completed");
      }
      const statusElement = document.getElementById(`status-cap-${moduleId}`);
      if (statusElement) {
        statusElement.innerHTML = `Status: <span style="color:var(--success); font-weight:bold;">Passed</span>`;
      }
    }

    // Sum individual components for this specific module
    const mVis = userProgressState.scores[scoreKeyVis] || 0.0;
    const mSim = userProgressState.scores[scoreKeySim] || 0.0;
    const mQz  = userProgressState.scores[scoreKeyQz]  || 0.0;
    const moduleTotal = mVis + mSim + mQz;

    const scoreElement = document.getElementById(`score-cap-${moduleId}`);
    if (scoreElement) {
      scoreElement.innerText = `Module Score: ${moduleTotal.toFixed(2)} / 12.5`;
    }
    
    calculateGlobalMetrics();
  }

  function calculateGlobalMetrics() {
    let globalCumulativeScore = 0.0;
    for (const scoreKey in userProgressState.scores) {
      if (userProgressState.scores.hasOwnProperty(scoreKey)) {
        globalCumulativeScore += userProgressState.scores[scoreKey];
      }
    }

    const completedCount = userProgressState.completedModules.size;
    
    // Update metric components in UI
    const totalScoreElement = document.getElementById("totalScoreTxt");
    if (totalScoreElement) {
      totalScoreElement.innerText = globalCumulativeScore.toFixed(2);
    }
    
    const progressTextElement = document.getElementById("progressTxt");
    if (progressTextElement) {
      progressTextElement.innerText = `${completedCount} / 8 Modules`;
    }
    
    const percentageFill = (completedCount / 8) * 100;
    const progressFillElement = document.getElementById("progressFill");
    if (progressFillElement) {
      progressFillElement.style.width = `${percentageFill}%`;
    }

    // Enable transcript download once all modules are completed
    const pdfBtn = document.getElementById("pdfBtn");
    if (pdfBtn) {
      if (completedCount === 8) {
        pdfBtn.removeAttribute("disabled");
      }
    }
  }

  /**
   * Professional Academic PDF Transcript Exporter
   * Generates formatted verified summaries via window.jspdf
   */
  function generateAcademicPDF() {
    if (!localAccessState.isAuthenticated) {
      window.alert('Please login to export your transcript.');
      return;
    }

    if (typeof window.jspdf === 'undefined' || typeof window.jspdf.jsPDF === 'undefined') {
      console.error('PDF generation library not loaded');
      return;
    }
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // Structural Geometry Parameters
    const marginX = 20;
    let cursorY = 25;

    // Header Title Elements
    doc.setFillColor(15, 23, 42); // Primary Dark #0f172a
    doc.rect(0, 0, 210, 40, "F");

    doc.setTextColor(255, 255, 255);
    doc.setFont("Helvetica", "bold");
    doc.setFontSize(22);
    doc.text("PROFESSOR SWORD ACADEMY", marginX, 26);

    doc.setFont("Helvetica", "normal");
    doc.setFontSize(10);
    doc.text("Official Management Mastery Academy Transcript Verification Document", marginX, 33);

    // Profile Meta Details Block
    cursorY = 55;
    doc.setTextColor(51, 65, 85);
    doc.setFont("Helvetica", "bold");
    doc.setFontSize(12);
    doc.text("STUDENT PROFILE REPORT", marginX, cursorY);
    
    cursorY += 8;
    doc.setDrawColor(226, 232, 240);
    doc.setLineWidth(0.5);
    doc.line(marginX, cursorY, 190, cursorY);

    cursorY += 10;
    doc.setFont("Helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`Student Name:  ${userProgressState.studentName}`, marginX, cursorY);
    
    let cumulativeFinalScore = 0.0;
    for (const key in userProgressState.scores) {
      if (userProgressState.scores.hasOwnProperty(key)) {
        cumulativeFinalScore += userProgressState.scores[key];
      }
    }
    
    doc.text(`Final Score:       ${cumulativeFinalScore.toFixed(2)} / 100.00 Marks`, marginX + 80, cursorY);

    cursorY += 6;
    const dateStamp = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    doc.text(`Issue Date:        ${dateStamp}`, marginX, cursorY);
    
    let academicGrade = "F";
    if (cumulativeFinalScore >= 90) academicGrade = "A (Excellent Performance)";
    else if (cumulativeFinalScore >= 80) academicGrade = "B (Very Good)";
    else if (cumulativeFinalScore >= 70) academicGrade = "C (Competent)";
    else if (cumulativeFinalScore >= 50) academicGrade = "D (Passing)";
    
    doc.setFont("Helvetica", "bold");
    doc.text(`Academic Rank: ${academicGrade}`, marginX + 80, cursorY);

    // Module Breakdown List Table
    cursorY += 18;
    doc.setFont("Helvetica", "bold");
    doc.setFontSize(12);
    doc.text("ACADEMIC PERFORMANCE TRACK BREAKDOWN", marginX, cursorY);

    cursorY += 6;
    doc.setFillColor(241, 245, 249);
    doc.rect(marginX, cursorY, 170, 8, "F");
    doc.setFontSize(9);
    doc.setTextColor(71, 85, 105);
    doc.text("MODULE TITLE", marginX + 4, cursorY + 5.5);
    doc.text("EARNED SCORE", marginX + 135, cursorY + 5.5);

    cursorY += 8;
    doc.setFont("Helvetica", "normal");
    doc.setTextColor(51, 65, 85);

    coreDataset.forEach(m => {
      const v = userProgressState.scores[`${m.id}_vis`] || 0;
      const s = userProgressState.scores[`${m.id}_sim`] || 0;
      const q = userProgressState.scores[`${m.id}_qz`] || 0;
      const totalSum = v + s + q;

      // Draw light horizontal separator rule
      doc.setDrawColor(241, 245, 249);
      doc.line(marginX, cursorY, 190, cursorY);

      doc.text(`Module ${m.id}: ${m.title}`, marginX + 4, cursorY + 6);
      doc.text(`${totalSum.toFixed(2)} / 12.50`, marginX + 138, cursorY + 6);
      cursorY += 9;
    });

    // Verification Seal Footer Element
    cursorY += 10;
    doc.setDrawColor(15, 23, 42);
    doc.line(marginX, cursorY, 190, cursorY);

    cursorY += 12;
    doc.setFont("Helvetica", "italic");
    doc.setFontSize(9);
    doc.text("This documentation file is securely finalized and certified under evaluation code [SWORD-AI-100].", marginX, cursorY);
    
    cursorY += 5;
    doc.setFont("Helvetica", "bold");
    doc.text("Verified Official Transcript - Professor SWORD ⚔️", marginX, cursorY);

    // Save PDF Stream to Client Browser
    doc.save(`Transcript_Management_Mastery_Michael.pdf`);
  }

  // Self-Starting Deployment Lifecycle Action Loop
  window.addEventListener("DOMContentLoaded", () => {
    applyPageAccess();
    initializeAcademyPlatform();
  });
</script>
