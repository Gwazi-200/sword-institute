<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Sword Institute</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        :root {
            --pearl-light:#FCFAF5;
            --pearl-mid:#F5F2EB;
            --pearl-shadow:#E8E2D8;
            --violet-deep:#8B00FF;
            --violet-soft:#A855F7;
            --gold-radiant:#FFD700;
            --text-primary:#1E1029;
            --text-secondary:#4B3A5C;
            --glass-bg:rgba(255,255,255,.55);
            --glass-border:rgba(255,255,255,.65);
        }

        * { box-sizing:border-box; }

        body {
            margin:0;
            min-height:100vh;
            font-family:'Inter',sans-serif;
            background:radial-gradient(circle at 0% 20%, var(--pearl-light), var(--pearl-mid) 60%, var(--pearl-shadow));
            color:var(--text-primary);
            display:grid;
            place-items:center;
            padding:24px;
        }

        .card {
            width:min(640px, 100%);
            background:var(--glass-bg);
            backdrop-filter:blur(28px) saturate(180%);
            border:1px solid var(--glass-border);
            border-radius:28px;
            box-shadow:0 25px 60px -15px rgba(139,0,255,.08);
            padding:36px;
        }

        .brand {
            display:flex;
            align-items:center;
            gap:10px;
            font-weight:800;
            margin-bottom:18px;
        }
        .brand i { color:var(--gold-radiant); }

        h1 {
            margin:0 0 12px;
            font-size:clamp(2rem, 4vw, 3rem);
        }

        p {
            color:var(--text-secondary);
            line-height:1.7;
            margin:0 0 16px;
        }

        .form {
            margin-top:20px;
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        label {
            font-size:.95rem;
            font-weight:700;
            color:var(--text-secondary);
        }

        input {
            width:100%;
            padding:12px 16px;
            border-radius:16px;
            border:1px solid rgba(139,0,255,.15);
            background:rgba(255,255,255,.55);
            outline:none;
            font-family:'Inter',sans-serif;
            font-size:1rem;
        }

        input:focus {
            border-color:rgba(139,0,255,.55);
            box-shadow:0 0 0 4px rgba(139,0,255,.12);
        }

        .actions {
            display:flex;
            flex-wrap:wrap;
            gap:12px;
            margin-top:24px;
        }

        .btn {
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            padding:12px 18px;
            border-radius:999px;
            font-weight:800;
            text-decoration:none;
            border:1px solid transparent;
            cursor:pointer;
            font-size:.98rem;
        }

        .primary { background:var(--violet-deep); color:#fff; }
        .secondary { background:rgba(139,0,255,.08); color:var(--violet-deep); border-color:rgba(139,0,255,.2); }

        .btn:disabled {
            opacity:.65;
            cursor:not-allowed;
        }

        .note {
            margin-top:10px;
            font-size:.9rem;
            color:var(--text-secondary);
        }

        /* Simple toast */
        .toast {
            position:fixed;
            right:18px;
            bottom:18px;
            background:rgba(30,16,41,.92);
            color:#fff;
            padding:12px 14px;
            border-radius:14px;
            box-shadow:0 18px 40px rgba(0,0,0,.2);
            max-width:420px;
            display:none;
            z-index:9999;
        }
        .toast.show { display:block; }
        .toast.success { background:rgba(22,163,74,.92); }
        .toast.error { background:rgba(220,38,38,.92); }
        .toast.warning { background:rgba(245,158,11,.92); }
    </style>
</head>
<body>
    <main class="card">
        <div class="brand"><i class="fas fa-shield-halved"></i> Sword Institute</div>
        <h1>Reset Your Password</h1>
        <p>
            Enter the email you used to register. We’ll send you a password reset link if the account exists.
        </p>

        <form class="form" id="reset-form">
            <div>
                <label for="reset-email">Email address</label>
                <input id="reset-email" type="email" autocomplete="email" placeholder="you@example.com" required />
            </div>

            <button class="btn primary" id="reset-submit" type="submit">
                <i class="fas fa-paper-plane"></i>
                Send reset link
            </button>

            <div class="note">
                Didn’t receive the email? Check your spam/junk folder. If you still need help, contact support.
            </div>
        </form>

        <div class="actions">
            <a class="btn secondary" href="login.html"><i class="fas fa-right-to-bracket"></i> Back to Login</a>
            <a class="btn secondary" href="contact.html"><i class="fas fa-envelope"></i> Contact Support</a>
        </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- Firebase (compat) for the legacy site scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD6lVyvaA7uhcX3qvxvOp3dqiGxb8Td4xs",
            authDomain: "sword-institute-lms.firebaseapp.com",
            projectId: "sword-institute-lms",
            storageBucket: "sword-institute-lms.firebasestorage.app",
            messagingSenderId: "478896038426",
            appId: "1:478896038426:web:c24c6373edc1cba14a67a3"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>

    <script type="module">
        import { resetPassword } from './js/auth.js';

        const form = document.getElementById('reset-form');
        const emailInput = document.getElementById('reset-email');
        const submitBtn = document.getElementById('reset-submit');
        const toastEl = document.getElementById('toast');

        function showToast(message, type = 'success') {
            toastEl.textContent = message;
            toastEl.classList.remove('success', 'error', 'warning');
            toastEl.classList.add(type);
            toastEl.classList.add('show');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => toastEl.classList.remove('show'), 4200);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = (emailInput.value || '').trim();
            if (!email) {
                showToast('Please enter your email address.', 'warning');
                return;
            }

            submitBtn.disabled = true;
            const oldHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                await resetPassword(email);
                showToast('If your account exists, we sent a password reset link to your email.', 'success');
            } catch (err) {
                console.error('Password reset failed:', err);
                showToast(err?.message || 'Password reset failed. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = oldHtml;
            }
        });
    </script>
</body>
</html>
